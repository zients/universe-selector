schema_version: 1
market: TW
ticker: 2330
default_model: fcf_dcf_v1
purpose: sample_schema_only
as_of: 2026-05-17
currency: TWD
amount_unit: currency_units
share_basis: ordinary_share
valuation_basis_note: Uses TWD ordinary-share basis; no ADR ratio, board-lot, or currency adjustment is applied.

facts_overrides:
  shares_outstanding: null
  net_debt: null
  reference_price: null

facts_override_notes:
  shares_outstanding: null
  net_debt: null
  reference_price: null

assumption_source: demo_template
prepared_by: universe-selector maintainers
source_note: Demonstration assumptions for schema validation only; not investment advice.

models:
  fcf_dcf_v1:
    forecast_years: 5
    terminal_method: perpetual_growth
    starting_fcf:
      # method options:
      # - provider_ttm_fcf: use provider raw TTM or annual FCF as the starting proxy.
      # - override: use analyst-supplied FCF from value/note below.
      method: provider_ttm_fcf
      # Required only when method: override.
      # value: 300000000000
      # note: Adjusted for one-time working capital movement.
    discount_rate_basis: nominal_wacc
    terminal_growth_basis: nominal_perpetual_growth
    scenarios:
      conservative:
        growth_rate: 0.03
        discount_rate: 0.10
        terminal_growth_rate: 0.02
        note: Lower illustrative growth and higher illustrative discount rate.
      base:
        growth_rate: 0.05
        discount_rate: 0.09
        terminal_growth_rate: 0.025
        note: Middle illustrative scenario; not a target case or recommendation.
      upside:
        growth_rate: 0.07
        discount_rate: 0.085
        terminal_growth_rate: 0.03
        note: Higher illustrative growth and lower illustrative discount rate.
  reverse_dcf_v1:
    forecast_years: 5
    terminal_method: perpetual_growth
    starting_fcf:
      method: provider_ttm_fcf
    discount_rate_basis: nominal_wacc
    terminal_growth_basis: nominal_perpetual_growth
    implied_growth_basis: constant_explicit_fcf_growth
    solver_abs_tolerance: 1000000000.0
    solver_max_iterations: 100
    scenarios:
      conservative:
        discount_rate: 0.10
        terminal_growth_rate: 0.02
        implied_growth_lower_bound: -0.20
        implied_growth_upper_bound: 0.20
        note: Lower assumption case for TWD ordinary-share reverse DCF reconciliation.
      base:
        discount_rate: 0.09
        terminal_growth_rate: 0.025
        implied_growth_lower_bound: -0.10
        implied_growth_upper_bound: 0.30
        note: Middle assumption case for TWD ordinary-share reverse DCF reconciliation.
      upside:
        discount_rate: 0.085
        terminal_growth_rate: 0.03
        implied_growth_lower_bound: -0.05
        implied_growth_upper_bound: 0.40
        note: Higher assumption case for TWD ordinary-share reverse DCF reconciliation.
  multiple_valuation_v1:
    starting_fcf:
      method: provider_ttm_fcf
    multiple_basis: ev_to_fcf
    scenarios:
      conservative:
        ev_to_fcf_multiple: 8.0
        note: Lower analyst-supplied TWD ordinary-share EV to FCF multiple case.
      base:
        ev_to_fcf_multiple: 12.0
        note: Middle analyst-supplied TWD ordinary-share EV to FCF multiple case.
      upside:
        ev_to_fcf_multiple: 16.0
        note: Higher analyst-supplied TWD ordinary-share EV to FCF multiple case.
