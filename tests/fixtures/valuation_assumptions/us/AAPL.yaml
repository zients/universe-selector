schema_version: 1
market: US
ticker: AAPL
default_model: fcf_dcf_v1
purpose: sample_schema_only
as_of: 2026-05-17
currency: USD
amount_unit: currency_units
share_basis: ordinary_share
valuation_basis_note: Uses USD ordinary-share basis; no ADR ratio, board-lot, or currency adjustment is applied.

facts_overrides:
  shares_outstanding: null
  net_debt: null
  reference_price: null

facts_override_notes:
  shares_outstanding: null
  net_debt: null
  reference_price: null

assumption_source: demo_template
prepared_by: universe-selector maintainers
source_note: Demonstration assumptions for schema validation only; not investment advice.

models:
  exit_multiple_dcf_v1:
    forecast_years: 5
    terminal_method: exit_multiple
    starting_fcf:
      method: provider_ttm_fcf
    discount_rate_basis: nominal_wacc
    exit_multiple_basis: ev_to_fcf
    scenarios:
      conservative:
        growth_rate: 0.02
        discount_rate: 0.10
        terminal_ev_to_fcf_multiple: 10.0
        note: Lower growth and lower analyst-supplied EV to FCF exit multiple case.
      base:
        growth_rate: 0.04
        discount_rate: 0.09
        terminal_ev_to_fcf_multiple: 14.0
        note: Middle analyst-supplied EV to FCF exit multiple case.
      upside:
        growth_rate: 0.06
        discount_rate: 0.085
        terminal_ev_to_fcf_multiple: 18.0
        note: Higher growth and higher analyst-supplied EV to FCF exit multiple case.
  fcf_dcf_v1:
    forecast_years: 5
    terminal_method: perpetual_growth
    starting_fcf:
      # method options:
      # - provider_ttm_fcf: use provider raw TTM or annual FCF as the starting proxy.
      # - override: use analyst-supplied FCF from value/note below.
      method: provider_ttm_fcf
      # Required only when method: override.
      # value: 100000000000
      # note: Adjusted for one-time working capital movement.
    discount_rate_basis: nominal_wacc
    terminal_growth_basis: nominal_perpetual_growth
    scenarios:
      conservative:
        growth_rate: 0.03
        discount_rate: 0.10
        terminal_growth_rate: 0.02
        note: Lower illustrative growth and higher illustrative discount rate.
      base:
        growth_rate: 0.05
        discount_rate: 0.09
        terminal_growth_rate: 0.025
        note: Middle illustrative scenario; not a target case or recommendation.
      upside:
        growth_rate: 0.07
        discount_rate: 0.085
        terminal_growth_rate: 0.03
        note: Higher illustrative growth and lower illustrative discount rate.
  implied_discount_rate_v1:
    forecast_years: 5
    terminal_method: perpetual_growth
    starting_fcf:
      method: provider_ttm_fcf
    growth_rate_basis: constant_explicit_fcf_growth
    terminal_growth_basis: nominal_perpetual_growth
    implied_discount_rate_basis: nominal_wacc
    solver_abs_tolerance: 0.000001
    solver_max_iterations: 100
    scenarios:
      conservative:
        growth_rate: 0.035
        terminal_growth_rate: 0.02
        implied_discount_rate_lower_bound: 0.05
        implied_discount_rate_upper_bound: 0.25
        note: Lower growth implied-discount diagnostic case.
      base:
        growth_rate: 0.05
        terminal_growth_rate: 0.025
        implied_discount_rate_lower_bound: 0.055
        implied_discount_rate_upper_bound: 0.25
        note: Middle growth implied-discount diagnostic case.
      upside:
        growth_rate: 0.07
        terminal_growth_rate: 0.03
        implied_discount_rate_lower_bound: 0.06
        implied_discount_rate_upper_bound: 0.25
        note: Higher growth implied-discount diagnostic case.
  two_stage_fcf_dcf_v1:
    stage1_years: 3
    stage2_years: 5
    terminal_method: perpetual_growth
    starting_fcf:
      method: provider_ttm_fcf
    discount_rate_basis: nominal_wacc
    terminal_growth_basis: nominal_perpetual_growth
    scenarios:
      conservative:
        stage1_growth_rate: 0.03
        stage2_growth_rate: 0.02
        discount_rate: 0.10
        terminal_growth_rate: 0.015
        note: Lower two-stage growth assumption case.
      base:
        stage1_growth_rate: 0.06
        stage2_growth_rate: 0.035
        discount_rate: 0.09
        terminal_growth_rate: 0.025
        note: Middle two-stage growth assumption case.
      upside:
        stage1_growth_rate: 0.09
        stage2_growth_rate: 0.05
        discount_rate: 0.085
        terminal_growth_rate: 0.03
        note: Higher two-stage growth assumption case.
  reverse_dcf_v1:
    forecast_years: 5
    terminal_method: perpetual_growth
    starting_fcf:
      method: provider_ttm_fcf
    discount_rate_basis: nominal_wacc
    terminal_growth_basis: nominal_perpetual_growth
    implied_growth_basis: constant_explicit_fcf_growth
    solver_abs_tolerance: 1000000.0
    solver_max_iterations: 100
    scenarios:
      conservative:
        discount_rate: 0.10
        terminal_growth_rate: 0.02
        implied_growth_lower_bound: -0.50
        implied_growth_upper_bound: 0.50
        note: Lower diagnostic reverse DCF reconciliation range; not a forecast range.
      base:
        discount_rate: 0.09
        terminal_growth_rate: 0.025
        implied_growth_lower_bound: -0.50
        implied_growth_upper_bound: 0.50
        note: Middle diagnostic reverse DCF reconciliation range; not a forecast range.
      upside:
        discount_rate: 0.085
        terminal_growth_rate: 0.03
        implied_growth_lower_bound: -0.50
        implied_growth_upper_bound: 0.50
        note: Higher diagnostic reverse DCF reconciliation range; not a forecast range.
  multiple_valuation_v1:
    starting_fcf:
      method: provider_ttm_fcf
    multiple_basis: ev_to_fcf
    scenarios:
      conservative:
        ev_to_fcf_multiple: 12.0
        note: Lower analyst-supplied EV to FCF multiple case.
      base:
        ev_to_fcf_multiple: 16.0
        note: Middle analyst-supplied EV to FCF multiple case.
      upside:
        ev_to_fcf_multiple: 20.0
        note: Higher analyst-supplied EV to FCF multiple case.
